<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="/options/options.css"/>
<title>Octoman 微博备份 - 选项</title>
</head>
<body>
<header class="opt-header">
  <h1>⚙️ 备份选项</h1>
</header>

<main class="opt-main">
  <div class="toast" id="toast" hidden></div>

  <div class="card">
    <div class="card-row">
      <label class="card-label" for="per_page">存档间隔</label>
      <div class="card-field">
        <input id="per_page" type="text" class="input" placeholder="500"/>
        <span class="field-hint">每多少条合并一个 html</span>
      </div>
      <button id="per_page_btn" class="btn-save">保存</button>
    </div>

    <div class="card-row">
      <label class="card-label" for="comment_row">转评赞栏</label>
      <div class="card-field">
        <select id="comment_row" class="select">
          <option value="1">保留</option>
          <option value="2">去除</option>
        </select>
      </div>
      <button id="comment_row_btn" class="btn-save">保存</button>
    </div>

    <div class="card-row">
      <label class="card-label" for="pic_show">预览图片</label>
      <div class="card-field">
        <select id="pic_show" class="select">
          <option value="1">缩略图</option>
          <option value="2">大图</option>
        </select>
      </div>
      <button id="pic_show_btn" class="btn-save">保存</button>
    </div>

    <div class="card-row">
      <label class="card-label" for="delay_page">翻页间隔</label>
      <div class="card-field">
        <input id="delay_page" type="text" class="input" placeholder="1.2"/>
        <span class="field-hint">秒，实际会随机抖动（支持小数）</span>
      </div>
      <button id="delay_page_btn" class="btn-save">保存</button>
    </div>
  </div>
</main>

<script src="/utils/config.js"></script>
<script src="/options/options.js"></script>
</body>
</html>
